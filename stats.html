<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Participant Stats - World Cup Sweepstake</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="hero">
    <h1>📊 Participant Stats</h1>
    <p class="subtitle">Select a participant to view team breakdowns, remaining counts, and elimination details.</p>

    <div class="summary stats-header-summary">
      <div class="card">
        <div class="label">Participants</div>
        <div id="participantCount" class="value">0</div>
      </div>

      <div class="card">
        <div class="label">Selected</div>
        <div id="selectedPlayer" class="value">—</div>
      </div>
    </div>

    <div class="hero-actions">
      <a class="button primary" href="index.html">← Back to dashboard</a>
    </div>
  </header>

  <main>
    <section class="section">
      <h2>Choose a participant</h2>
      <select id="participant-select" class="participant-select"></select>
    </section>

    <section class="section">
      <h2>Participant summary</h2>
      <div id="participant-summary" class="stats-grid"></div>
    </section>

    <section class="section">
      <h2>Team details</h2>
      <div id="participant-teams" class="team-groups"></div>
    </section>
  </main>

  <footer>
    <p>Updated manually after each match ⚽</p>
  </footer>

  <script src="data.js"></script>
  <script src="stats.js"></script>
</body>
</html>
